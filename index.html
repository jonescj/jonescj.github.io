<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — [Your Name]</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0c0e;
      --bg2:       #111114;
      --bg3:       #18181d;
      --surface:   #1e1e25;
      --border:    #2a2a35;
      --border2:   #3a3a48;
      --text:      #e8e8f0;
      --text2:     #9898b0;
      --text3:     #5a5a72;
      --accent:    #c8f07a;       /* lime-green: math/logic energy */
      --accent2:   #7ab8f0;       /* blue: CS/systematic */
      --accent3:   #f0a87a;       /* amber: warmth/craft */
      --mono:      'DM Mono', monospace;
      --serif:     'DM Serif Display', serif;
      --sans:      'DM Sans', sans-serif;
      --nav-w:     220px;
      --max-w:     860px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── Layout ── */
    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar Nav ── */
    .sidebar {
      width: var(--nav-w);
      min-height: 100vh;
      position: fixed;
      top: 0; left: 0;
      display: flex;
      flex-direction: column;
      padding: 48px 0 32px;
      border-right: 1px solid var(--border);
      background: var(--bg);
      z-index: 100;
    }

    .sidebar-brand {
      padding: 0 28px 40px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .brand-name {
      font-family: var(--serif);
      font-size: 1.15rem;
      color: var(--text);
      line-height: 1.3;
      display: block;
      margin-bottom: 6px;
    }

    .brand-title {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .nav-list {
      list-style: none;
      flex: 1;
      padding: 0 16px;
    }

    .nav-item {
      margin-bottom: 2px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 6px;
      text-decoration: none;
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--text2);
      transition: all 0.15s ease;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .nav-link:hover {
      color: var(--text);
      background: var(--surface);
    }

    .nav-link.active {
      color: var(--text);
      background: var(--surface);
      font-weight: 500;
    }

    .nav-link.active .nav-dot {
      background: var(--accent);
    }

    .nav-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--border2);
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .nav-index {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text3);
      margin-left: auto;
    }

    .sidebar-footer {
      padding: 24px 28px 0;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
    }

    .social-link {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text3);
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: color 0.15s;
    }
    .social-link:hover { color: var(--accent); }

    /* ── Main Content ── */
    .main {
      margin-left: var(--nav-w);
      flex: 1;
      padding: 0 60px 120px;
      max-width: calc(var(--max-w) + 120px);
    }

    /* ── Section ── */
    .section {
      padding-top: 80px;
      padding-bottom: 64px;
      border-bottom: 1px solid var(--border);
      animation: fadeUp 0.5s ease both;
    }

    .section:last-child { border-bottom: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Section Header ── */
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 48px;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .section-divider {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .section-num {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--text3);
    }

    /* ── Hero ── */
    .hero-eyebrow {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--accent2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hero-eyebrow::before {
      content: '';
      display: inline-block;
      width: 24px;
      height: 1px;
      background: var(--accent2);
    }

    .hero-title {
      font-family: var(--serif);
      font-size: clamp(2.8rem, 5vw, 4rem);
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    .hero-title em {
      font-style: italic;
      color: var(--accent);
    }

    .hero-subtitle {
      font-family: var(--sans);
      font-size: 1.05rem;
      color: var(--text2);
      font-weight: 300;
      margin-bottom: 32px;
      max-width: 560px;
      line-height: 1.7;
    }

    .hero-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 40px;
    }

    .tag {
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 3px;
      letter-spacing: 0.05em;
    }

    .tag-math  { background: rgba(200,240,122,0.08); color: var(--accent);  border: 1px solid rgba(200,240,122,0.2); }
    .tag-cs    { background: rgba(122,184,240,0.08); color: var(--accent2); border: 1px solid rgba(122,184,240,0.2); }
    .tag-ux    { background: rgba(240,168,122,0.08); color: var(--accent3); border: 1px solid rgba(240,168,122,0.2); }

    .hero-cta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.15s ease;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .btn-primary {
      background: var(--accent);
      color: #0c0c0e;
      font-weight: 500;
    }
    .btn-primary:hover { background: #d6f78c; transform: translateY(-1px); }

    .btn-ghost {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border2);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--text3); background: var(--surface); }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-top: 48px;
    }

    .stat {
      background: var(--bg2);
      padding: 24px 28px;
    }

    .stat-num {
      font-family: var(--serif);
      font-size: 2rem;
      color: var(--text);
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--text3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── Cards ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .cards-grid.cols-3 {
      grid-template-columns: repeat(3, 1fr);
    }

    .card {
      background: var(--bg2);
      padding: 28px;
      transition: background 0.15s;
      position: relative;
    }

    .card:hover { background: var(--bg3); }

    .card-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .card-title {
      font-family: var(--serif);
      font-size: 1.1rem;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--text2);
      line-height: 1.65;
      font-weight: 300;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .card-meta {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text3);
    }

    .card-link {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: gap 0.15s;
    }
    .card-link:hover { gap: 8px; }

    .card-accent-bar {
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
    }

    /* ── Case Study Card ── */
    .case-study-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 36px;
      margin-bottom: 16px;
      transition: border-color 0.2s;
      position: relative;
      overflow: hidden;
    }
    .case-study-card:hover { border-color: var(--border2); }

    .case-study-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(200,240,122,0.03) 0%, transparent 70%);
      pointer-events: none;
    }

    .case-study-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 16px;
    }

    .case-study-number {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text3);
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 3px;
      flex-shrink: 0;
    }

    .case-study-tags {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px;
    }

    .pill {
      font-family: var(--mono);
      font-size: 0.62rem;
      padding: 3px 8px;
      border-radius: 3px;
      background: var(--surface);
      color: var(--text3);
      letter-spacing: 0.04em;
    }

    /* ── About ── */
    .about-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .about-body p {
      font-size: 0.95rem;
      color: var(--text2);
      font-weight: 300;
      line-height: 1.8;
      margin-bottom: 20px;
    }

    .about-body p:last-child { margin-bottom: 0; }

    .about-aside {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .aside-block {
      padding: 20px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .aside-block-title {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .aside-list {
      list-style: none;
    }

    .aside-list li {
      font-size: 0.83rem;
      color: var(--text2);
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .aside-list li:last-child { border-bottom: none; }

    .aside-list li::before {
      content: '→';
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text3);
    }

    /* ── Resume ── */
    .resume-section-title {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--accent2);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 20px;
      margin-top: 36px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .resume-section-title:first-child { margin-top: 0; }

    .resume-entry {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }

    .resume-entry:last-child { border-bottom: none; }

    .resume-role {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 3px;
    }

    .resume-org {
      font-size: 0.83rem;
      color: var(--text2);
      margin-bottom: 8px;
    }

    .resume-detail {
      font-size: 0.8rem;
      color: var(--text3);
      line-height: 1.6;
    }

    .resume-date {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text3);
      white-space: nowrap;
      padding-top: 3px;
    }

    .skills-clusters {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 4px;
    }

    .skill-cluster {
      padding: 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .skill-cluster-title {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text3);
      margin-bottom: 10px;
      letter-spacing: 0.08em;
    }

    .skill-cluster ul {
      list-style: none;
    }

    .skill-cluster li {
      font-size: 0.8rem;
      color: var(--text2);
      padding: 3px 0;
    }

    /* ── Contact ── */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
      max-width: 560px;
    }

    .contact-intro {
      font-size: 0.95rem;
      color: var(--text2);
      font-weight: 300;
      line-height: 1.8;
      margin-bottom: 32px;
    }

    .contact-links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .contact-link-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .contact-link-row:hover { border-color: var(--border2); background: var(--bg3); }

    .contact-link-icon {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--accent);
      width: 20px;
    }

    .contact-link-text {
      font-size: 0.85rem;
      color: var(--text);
    }

    .contact-link-sub {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text3);
      margin-left: auto;
    }



    /* ── Experiment cards ── */
    .exp-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      transition: border-color 0.2s;
    }
    .exp-card:hover { border-color: var(--border2); }

    .exp-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .exp-status {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      padding: 3px 8px;
      border-radius: 3px;
    }
    .status-active   { background: rgba(200,240,122,0.1); color: var(--accent); }
    .status-draft    { background: rgba(90,90,114,0.3);   color: var(--text3); }
    .status-complete { background: rgba(122,184,240,0.1); color: var(--accent2); }

    .exp-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    /* ── Misc ── */
    strong { font-weight: 500; color: var(--text); }

    .geometric-accent {
      position: absolute;
      right: -20px;
      top: 40px;
      width: 120px;
      height: 120px;
      border: 1px solid var(--border);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.4;
    }

    .geometric-accent::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 60px; height: 60px;
      border: 1px solid var(--border2);
      border-radius: 50%;
    }

    /* ── Mobile ── */
    @media (max-width: 900px) {
      :root { --nav-w: 0px; }
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 0 24px 80px; }
      .about-grid,
      .contact-grid { grid-template-columns: 1fr; }
      .cards-grid.cols-3 { grid-template-columns: 1fr 1fr; }
      .skills-clusters { grid-template-columns: 1fr; }
      .exp-grid { grid-template-columns: 1fr 1fr; }
      .stats-row { grid-template-columns: 1fr; }
    }
  </style>
</head>

    // ── App ───────────────────────────────────────────────────────────────────

    function App() {
      const [active, setActive] = useState('home');

      useEffect(() => {
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); });
          },
          { rootMargin: '-30% 0px -60% 0px' }
        );
        NAV.forEach(n => {
          const el = document.getElementById(n.id);
          if (el) observer.observe(el);
        });
        return () => observer.disconnect();
      }, []);

      return (
